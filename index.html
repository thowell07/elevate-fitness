<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Elevate</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (to compile JSX in browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Safe area padding for iPhone notch/home bar */
        body {
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
            background-color: #f9fafb; /* Match bg-gray-50 */
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (Inlined for single-file portability) ---
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const HomeIcon = (props) => <Icon {...props}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></Icon>;
        const PlusIcon = (props) => <Icon {...props}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></Icon>;
        const HistoryIcon = (props) => <Icon {...props}><path d="M3 3v5h5"></path><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"></path><path d="M12 7v5l4 2"></path></Icon>;
        const CheckCircleIcon = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></Icon>;
        const CircleIcon = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"></circle></Icon>;
        const BarChart2Icon = (props) => <Icon {...props}><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></Icon>;
        const Trash2Icon = (props) => <Icon {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></Icon>;
        const TrendingUpIcon = (props) => <Icon {...props}><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></Icon>;
        const CalendarIcon = (props) => <Icon {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></Icon>;
        const ActivityIcon = (props) => <Icon {...props}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></Icon>;
        const FlameIcon = (props) => <Icon {...props}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></Icon>;
        const ZapIcon = (props) => <Icon {...props}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></Icon>;

        // --- COMPONENTS ---

        const Logo = ({ className = "h-12", theme = "dark" }) => {
            const mainColor = theme === "dark" ? "#FFFFFF" : "#111111";
            return (
                <div className={`flex flex-col items-center justify-center ${className}`}>
                    <svg viewBox="0 0 100 80" className="h-12 w-auto mb-1">
                        <rect x="10" y="25" width="8" height="30" rx="2" fill={mainColor} />
                        <rect x="20" y="20" width="8" height="40" rx="2" fill={mainColor} />
                        <rect x="72" y="20" width="8" height="40" rx="2" fill={mainColor} />
                        <rect x="82" y="25" width="8" height="30" rx="2" fill={mainColor} />
                        <path d="M35 20 H65 V30 H55 V70 H45 V30 H35 Z" fill={mainColor} />
                        <path d="M 30 45 L 40 45 L 48 60 L 55 35 L 62 45 L 70 45" fill="none" stroke="#3B82F6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    <div className={`text-2xl font-black tracking-widest uppercase leading-none ${theme === "dark" ? "text-white" : "text-gray-900"}`}>
                        Elevate
                    </div>
                </div>
            );
        };

        const BottomNav = ({ activeTab, setActiveTab }) => {
            const tabs = [
                { id: 'home', icon: HomeIcon, label: 'Home' },
                { id: 'track', icon: PlusIcon, label: 'Track' },
                { id: 'history', icon: HistoryIcon, label: 'History' },
                { id: 'habits', icon: CheckCircleIcon, label: 'Habits' },
                { id: 'metrics', icon: BarChart2Icon, label: 'In-Body' },
            ];

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 pb-safe pt-2 px-2 flex justify-around items-center z-50 h-16 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    {tabs.map((tab) => (
                        <button
                            key={tab.id}
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors duration-200 ${activeTab === tab.id ? 'text-blue-600' : 'text-gray-400 hover:text-gray-600'}`}
                        >
                            <tab.icon size={22} strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                            <span className="text-[9px] font-medium uppercase tracking-wide">{tab.label}</span>
                        </button>
                    ))}
                </div>
            );
        };

        const HomeDashboard = ({ setActiveTab, workouts, habits }) => {
            const [quote, setQuote] = useState({ text: "", author: "" });

            useEffect(() => {
                const quotes = [
                    { text: "The only bad workout is the one that didn't happen.", author: "Unknown" },
                    { text: "Strength does not come from physical capacity. It comes from an indomitable will.", author: "Mahatma Gandhi" },
                    { text: "Discipline is doing what needs to be done, even if you don't want to do it.", author: "Unknown" },
                    { text: "Don't stop when you're tired. Stop when you're done.", author: "David Goggins" },
                    { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", author: "Aristotle" },
                ];
                setQuote(quotes[Math.floor(Math.random() * quotes.length)]);
            }, []);

            const getWeeklyStatus = () => {
                const today = new Date();
                const dayOfWeek = today.getDay();
                const startOfWeek = new Date(today);
                startOfWeek.setDate(today.getDate() - dayOfWeek);
                startOfWeek.setHours(0, 0, 0, 0);

                const weekDays = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek);
                    d.setDate(startOfWeek.getDate() + i);
                    const dateStr = d.toISOString().split('T')[0];
                    const hasWorkout = workouts.some(w => w.date.startsWith(dateStr));
                    weekDays.push({ dayName: d.toLocaleDateString('en-US', { weekday: 'narrow' }), hasWorkout, isFuture: d > today });
                }
                return weekDays;
            };

            const weekStatus = getWeeklyStatus();
            const todayStr = new Date().toLocaleDateString();
            const habitsDoneToday = habits[todayStr] ? habits[todayStr].length : 0;

            return (
                <div className="pb-24 bg-gray-50 min-h-screen">
                    <div className="relative bg-gray-900 text-white pt-12 pb-16 px-6 rounded-b-[3rem] shadow-xl overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-blue-600 rounded-full mix-blend-overlay opacity-20 filter blur-3xl transform translate-x-1/2 -translate-y-1/2"></div>
                        <div className="absolute bottom-0 left-0 w-48 h-48 bg-blue-400 rounded-full mix-blend-overlay opacity-10 filter blur-2xl transform -translate-x-1/2 translate-y-1/2"></div>
                        
                        <div className="relative z-10 flex flex-col items-center text-center">
                            <Logo theme="dark" className="mb-6 transform scale-110" />
                            <h1 className="text-3xl font-black italic tracking-tight mb-2">
                                UNLEASH YOUR <span className="text-blue-500">POTENTIAL</span>
                            </h1>
                            <p className="text-gray-400 text-sm max-w-xs mx-auto italic">"{quote.text}"</p>
                        </div>
                    </div>

                    <div className="px-6 -mt-10 relative z-20 space-y-6">
                        <div className="bg-white rounded-2xl p-5 shadow-lg border border-gray-100">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                    <FlameIcon size={18} className="text-orange-500" /> Weekly Streak
                                </h3>
                                <span className="text-xs font-bold text-gray-400 uppercase tracking-wider">This Week</span>
                            </div>
                            <div className="flex justify-between items-center">
                                {weekStatus.map((day, idx) => (
                                    <div key={idx} className="flex flex-col items-center gap-2">
                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all ${day.hasWorkout ? 'bg-blue-500 text-white shadow-md scale-110' : day.isFuture ? 'bg-gray-100 text-gray-300' : 'bg-gray-200 text-gray-400'}`}>
                                            {day.hasWorkout && <CheckCircleIcon size={14} />}
                                        </div>
                                        <span className="text-[10px] font-bold text-gray-400">{day.dayName}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <button onClick={() => setActiveTab('track')} className="bg-blue-600 hover:bg-blue-700 text-white p-5 rounded-2xl shadow-lg shadow-blue-200 flex flex-col items-start justify-between h-32 transition-transform active:scale-95">
                                <div className="bg-white/20 p-2 rounded-lg"><PlusIcon size={24} className="text-white" /></div>
                                <div className="text-left">
                                    <div className="text-xs font-bold opacity-80 uppercase mb-1">Start Now</div>
                                    <div className="font-black text-lg leading-none">Log Workout</div>
                                </div>
                            </button>
                            <button onClick={() => setActiveTab('habits')} className="bg-white hover:bg-gray-50 text-gray-800 p-5 rounded-2xl shadow-lg border border-gray-100 flex flex-col items-start justify-between h-32 transition-transform active:scale-95">
                                <div className="bg-green-100 p-2 rounded-lg"><CheckCircleIcon size={24} className="text-green-600" /></div>
                                <div className="text-left w-full">
                                    <div className="text-xs font-bold text-gray-400 uppercase mb-1">Daily Goals</div>
                                    <div className="flex justify-between items-end">
                                        <div className="font-black text-lg leading-none">Habits</div>
                                        <div className="text-xs font-bold bg-gray-100 px-2 py-1 rounded text-gray-600">{habitsDoneToday}/5</div>
                                    </div>
                                </div>
                            </button>
                        </div>

                        <div className="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
                            <div className="flex items-center justify-between mb-3">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2">
                                    <ActivityIcon size={18} className="text-blue-500" /> Recent Activity
                                </h3>
                                <button onClick={() => setActiveTab('history')} className="text-xs text-blue-600 font-bold">View All</button>
                            </div>
                            {workouts.length > 0 ? (
                                <div className="text-sm text-gray-600 bg-gray-50 p-3 rounded-xl border border-gray-100">
                                    <span className="font-bold text-gray-900">{workouts[0].lift}</span>
                                    <div className="text-xs text-gray-500 mt-1">{new Date(workouts[0].date).toLocaleDateString()} • {workouts[0].sets.length} sets logged</div>
                                </div>
                            ) : (
                                <div className="text-xs text-center py-4 text-gray-400 italic">No workouts yet. Let's change that!</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const WorkoutTracker = ({ workouts, setWorkouts }) => {
            const [movement, setMovement] = useState('');
            const [lift, setLift] = useState('');
            const [sets, setSets] = useState([{ reps: '', weight: '' }]);
            const [showSuccess, setShowSuccess] = useState(false);

            const getLastSession = () => {
                if (!lift) return null;
                const history = workouts.filter(w => w.lift.toLowerCase() === lift.toLowerCase());
                if (history.length === 0) return null;
                return history.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
            };
            const lastSession = getLastSession();

            const addSet = () => setSets([...sets, { reps: '', weight: '' }]);
            const updateSet = (index, field, value) => {
                const newSets = [...sets];
                newSets[index][field] = value;
                setSets(newSets);
            };
            const removeSet = (index) => {
                if (sets.length === 1) return;
                const newSets = sets.filter((_, i) => i !== index);
                setSets(newSets);
            };
            const saveWorkout = () => {
                if (!movement || !lift) return;
                const newWorkout = { id: Date.now(), date: new Date().toISOString(), movement, lift, sets };
                setWorkouts([newWorkout, ...workouts]);
                setMovement(''); setLift(''); setSets([{ reps: '', weight: '' }]);
                setShowSuccess(true); setTimeout(() => setShowSuccess(false), 2000);
            };

            return (
                <div className="p-4 space-y-6 pb-24 pt-10">
                    <header className="flex flex-col items-center mb-6">
                        <Logo theme="light" className="mb-4 scale-75" />
                        <h2 className="text-xl font-bold text-gray-800">Log Workout</h2>
                        <p className="text-sm text-gray-500">{new Date().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                    </header>
                    <div className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Movement Type</label>
                            <select value={movement} onChange={(e) => setMovement(e.target.value)} className="w-full p-3 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm">
                                <option value="">Select Movement</option>
                                <option value="Push">Push (Chest/Shoulders/Triceps)</option>
                                <option value="Pull">Pull (Back/Biceps)</option>
                                <option value="Legs">Legs (Quads/Hams/Calves)</option>
                                <option value="Core">Core</option>
                                <option value="Cardio">Cardio</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase mb-1">Lift / Exercise</label>
                            <input type="text" value={lift} onChange={(e) => setLift(e.target.value)} placeholder="e.g. Bench Press" className="w-full p-3 bg-white border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm"/>
                        </div>
                        {lastSession && (
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm text-blue-800 shadow-sm">
                                <div className="flex items-center gap-2 font-bold mb-1"><TrendingUpIcon size={16} /><span>Last Session ({new Date(lastSession.date).toLocaleDateString()})</span></div>
                                <div className="pl-6 text-blue-600">Best Set: <span className="font-bold">{Math.max(...lastSession.sets.map(s => s.weight))}lbs</span></div>
                            </div>
                        )}
                        <div className="space-y-3">
                            <label className="block text-xs font-bold text-gray-500 uppercase">Sets Performance</label>
                            {sets.map((set, index) => (
                                <div key={index} className="flex items-center gap-3">
                                    <div className="w-6 text-center font-bold text-gray-400 text-sm">{index + 1}</div>
                                    <div className="flex-1 relative"><input type="number" placeholder="lbs" value={set.weight} onChange={(e) => updateSet(index, 'weight', e.target.value)} className="w-full p-3 pl-8 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/><span className="absolute left-3 top-3 text-xs text-gray-400 font-bold">W</span></div>
                                    <div className="flex-1 relative"><input type="number" placeholder="reps" value={set.reps} onChange={(e) => updateSet(index, 'reps', e.target.value)} className="w-full p-3 pl-8 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/><span className="absolute left-3 top-3 text-xs text-gray-400 font-bold">R</span></div>
                                    {sets.length > 1 && (<button onClick={() => removeSet(index)} className="text-red-400 p-2"><Trash2Icon size={18} /></button>)}
                                </div>
                            ))}
                            <button onClick={addSet} className="w-full py-3 border-2 border-dashed border-gray-300 rounded-xl text-gray-500 font-medium hover:bg-gray-50 flex items-center justify-center gap-2"><PlusIcon size={18} /> Add Set</button>
                        </div>
                        <button onClick={saveWorkout} disabled={!movement || !lift} className={`w-full py-4 rounded-xl font-bold text-white shadow-xl transition-all transform active:scale-95 ${!movement || !lift ? 'bg-gray-300' : 'bg-blue-600 hover:bg-blue-700'}`}>{showSuccess ? 'Saved!' : 'Save Workout'}</button>
                    </div>
                </div>
            );
        };

        const HistoryView = ({ workouts, deleteWorkout }) => {
            const groupedWorkouts = workouts.reduce((groups, workout) => {
                const date = new Date(workout.date).toLocaleDateString();
                if (!groups[date]) groups[date] = [];
                groups[date].push(workout);
                return groups;
            }, {});

            return (
                <div className="p-4 pb-24 pt-10">
                    <header className="flex flex-col items-center mb-6">
                        <Logo theme="light" className="mb-4 scale-75" />
                        <h2 className="text-xl font-bold text-gray-800">History</h2>
                        <p className="text-sm text-gray-500">Your progressive journey</p>
                    </header>
                    {Object.keys(groupedWorkouts).length === 0 ? (
                        <div className="text-center py-12 text-gray-400"><HistoryIcon size={48} className="mx-auto mb-4 opacity-20" /><p>No workouts logged yet.</p></div>
                    ) : (
                        <div className="space-y-8">
                            {Object.entries(groupedWorkouts).sort((a,b) => new Date(b[0]) - new Date(a[0])).map(([date, daysWorkouts]) => (
                                <div key={date} className="space-y-3">
                                    <div className="flex items-center gap-2 mb-2"><CalendarIcon size={16} className="text-blue-500" /><h3 className="text-sm font-bold text-gray-800">{date}</h3></div>
                                    {daysWorkouts.map((workout) => (
                                        <div key={workout.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 relative group">
                                            <button onClick={() => deleteWorkout(workout.id)} className="absolute top-3 right-3 text-gray-300 hover:text-red-500"><Trash2Icon size={16} /></button>
                                            <div className="flex items-center gap-3 mb-2">
                                                <span className="px-2 py-1 bg-blue-50 text-blue-600 text-[10px] font-bold uppercase rounded-md tracking-wider">{workout.movement}</span>
                                                <h4 className="font-bold text-gray-800">{workout.lift}</h4>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {workout.sets.map((set, i) => (<div key={i} className="text-xs bg-gray-50 px-2 py-1 rounded text-gray-600 border border-gray-200"><span className="font-bold">{set.weight}</span>lbs x <span className="font-bold">{set.reps}</span></div>))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const HabitTracker = ({ habits, toggleHabit }) => {
            const today = new Date().toLocaleDateString();
            const defaultHabits = [
                { id: 1, name: '7 Hours Sleep', icon: '😴' },
                { id: 2, name: 'Meditation', icon: '🧘' },
                { id: 3, name: '3L Water', icon: '💧' },
                { id: 4, name: 'Protein Goal', icon: '🥩' },
                { id: 5, name: 'Stretch / Mobility', icon: '🤸' }
            ];
            const getHabitStatus = (habitId) => habits[today] && habits[today].includes(habitId);

            return (
                <div className="p-4 pb-24 pt-10">
                    <header className="flex flex-col items-center mb-8">
                        <Logo theme="light" className="mb-4 scale-75" />
                        <h2 className="text-xl font-bold text-gray-800">Daily Habits</h2>
                        <p className="text-sm text-gray-500">{today}</p>
                    </header>
                    <div className="grid gap-4">
                        {defaultHabits.map((habit) => {
                            const isCompleted = getHabitStatus(habit.id);
                            return (
                                <button key={habit.id} onClick={() => toggleHabit(today, habit.id)} className={`p-4 rounded-2xl flex items-center justify-between transition-all shadow-sm border-2 ${isCompleted ? 'bg-blue-50 border-blue-500' : 'bg-white border-transparent hover:border-gray-200'}`}>
                                    <div className="flex items-center gap-4">
                                        <div className={`p-3 rounded-full ${isCompleted ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-400'}`}>{isCompleted ? <CheckCircleIcon size={24} /> : <CircleIcon size={24} />}</div>
                                        <div className="text-left"><span className="text-lg mr-2">{habit.icon}</span><span className={`font-bold ${isCompleted ? 'text-gray-800' : 'text-gray-500'}`}>{habit.name}</span></div>
                                    </div>
                                </button>
                            );
                        })}
                    </div>
                    <div className="mt-8 p-6 bg-gradient-to-r from-gray-900 to-gray-800 rounded-2xl text-white shadow-xl">
                        <div className="flex items-start gap-4"><ZapIcon className="text-yellow-400 flex-shrink-0" size={24} /><div><h3 className="font-bold text-lg mb-1">Consistency Check</h3><p className="text-gray-300 text-sm opacity-80 leading-relaxed">Small disciplines repeated with consistency every day lead to great achievements gained slowly over time.</p></div></div>
                    </div>
                </div>
            );
        };

        const Biometrics = ({ metrics, setMetrics }) => {
            const [weight, setWeight] = useState('');
            const [muscle, setMuscle] = useState('');
            const [fat, setFat] = useState('');
            const saveMetric = () => {
                if (!weight) return;
                const newMetric = { id: Date.now(), date: new Date().toISOString(), weight, muscle, fat };
                setMetrics([newMetric, ...metrics]);
                setWeight(''); setMuscle(''); setFat('');
            };
            const latest = metrics[0];

            return (
                <div className="p-4 pb-24 pt-10">
                    <header className="flex flex-col items-center mb-6">
                        <Logo theme="light" className="mb-4 scale-75" />
                        <h2 className="text-xl font-bold text-gray-800">In-Body Results</h2>
                        <p className="text-sm text-gray-500">Track your composition</p>
                    </header>
                    {latest && (
                        <div className="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl p-6 text-white shadow-xl mb-8 relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
                            <div className="text-xs font-bold opacity-60 uppercase mb-4 flex items-center gap-2"><CalendarIcon size={12} /> {new Date(latest.date).toLocaleDateString()}</div>
                            <div className="grid grid-cols-3 gap-4 text-center relative z-10">
                                <div><div className="text-3xl font-black tracking-tight">{latest.weight}</div><div className="text-[10px] font-bold uppercase opacity-70 tracking-wider">Weight</div></div>
                                <div className="border-l border-white/20"><div className="text-3xl font-black tracking-tight">{latest.muscle}</div><div className="text-[10px] font-bold uppercase opacity-70 tracking-wider">SMM</div></div>
                                <div className="border-l border-white/20"><div className="text-3xl font-black tracking-tight">{latest.fat}%</div><div className="text-[10px] font-bold uppercase opacity-70 tracking-wider">PBF</div></div>
                            </div>
                        </div>
                    )}
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-8">
                        <h3 className="font-bold text-gray-700 mb-4 flex items-center gap-2 text-sm uppercase tracking-wide"><PlusIcon size={16} className="text-blue-500" /> Log New Scan</h3>
                        <div className="grid grid-cols-3 gap-3 mb-4">
                            <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Weight</label><input type="number" value={weight} onChange={(e) => setWeight(e.target.value)} className="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-center font-bold focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="lbs"/></div>
                            <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">SMM</label><input type="number" value={muscle} onChange={(e) => setMuscle(e.target.value)} className="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-center font-bold focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="lbs"/></div>
                            <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Body Fat</label><input type="number" value={fat} onChange={(e) => setFat(e.target.value)} className="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-center font-bold focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="%"/></div>
                        </div>
                        <button onClick={saveMetric} disabled={!weight} className="w-full py-4 bg-gray-900 text-white rounded-xl font-bold text-sm hover:bg-black disabled:bg-gray-300 transition-all shadow-lg">Save Results</button>
                    </div>
                    <div className="space-y-3">
                        <h3 className="font-bold text-gray-400 text-xs uppercase tracking-wider pl-2">Previous Scans</h3>
                        {metrics.map((m) => (
                            <div key={m.id} className="flex justify-between items-center p-4 bg-white rounded-xl border border-gray-100 shadow-sm">
                                <div className="text-sm font-bold text-gray-600">{new Date(m.date).toLocaleDateString()}</div>
                                <div className="flex gap-4 text-sm"><span className="text-gray-800 font-mono font-bold">{m.weight}lbs</span>{m.fat && <span className="text-blue-600 font-mono font-bold">{m.fat}%</span>}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ElevateApp = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [workouts, setWorkouts] = useState(() => { const saved = localStorage.getItem('elevate_workouts'); return saved ? JSON.parse(saved) : []; });
            const [habits, setHabits] = useState(() => { const saved = localStorage.getItem('elevate_habits'); return saved ? JSON.parse(saved) : {}; });
            const [metrics, setMetrics] = useState(() => { const saved = localStorage.getItem('elevate_metrics'); return saved ? JSON.parse(saved) : []; });

            useEffect(() => { localStorage.setItem('elevate_workouts', JSON.stringify(workouts)); }, [workouts]);
            useEffect(() => { localStorage.setItem('elevate_habits', JSON.stringify(habits)); }, [habits]);
            useEffect(() => { localStorage.setItem('elevate_metrics', JSON.stringify(metrics)); }, [metrics]);

            const deleteWorkout = (id) => { if (confirm('Delete this workout?')) { setWorkouts(workouts.filter(w => w.id !== id)); } };
            const toggleHabit = (date, habitId) => {
                const currentHabits = habits[date] || [];
                let newHabitsForDate;
                if (currentHabits.includes(habitId)) { newHabitsForDate = currentHabits.filter(id => id !== habitId); } else { newHabitsForDate = [...currentHabits, habitId]; }
                setHabits({ ...habits, [date]: newHabitsForDate });
            };

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-900">
                    <main className="max-w-md mx-auto bg-gray-50 min-h-screen shadow-2xl overflow-hidden">
                        {activeTab === 'home' && <HomeDashboard setActiveTab={setActiveTab} workouts={workouts} habits={habits} />}
                        {activeTab === 'track' && <WorkoutTracker workouts={workouts} setWorkouts={setWorkouts} />}
                        {activeTab === 'history' && <HistoryView workouts={workouts} deleteWorkout={deleteWorkout} />}
                        {activeTab === 'habits' && <HabitTracker habits={habits} toggleHabit={toggleHabit} />}
                        {activeTab === 'metrics' && <Biometrics metrics={metrics} setMetrics={setMetrics} />}
                    </main>
                    <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ElevateApp />);
    </script>
</body>
</html>
